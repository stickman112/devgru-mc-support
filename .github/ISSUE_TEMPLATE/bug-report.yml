name: Bug Report
description: Something broken or behaving unexpectedly on our server or website? Report it here.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Found a bug? Great catch. The more detail you give us, the faster we can fix it.

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the bug - what did you see or experience?
      placeholder: "e.g. The shop plugin charged me twice for one purchase"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "e.g. It should have charged me once and given me the item"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Help us make the bug happen again.
      placeholder: |
        1. Open the server shop
        2. Click "Buy" on iron ingots x64
        3. Confirm purchase
        4. Balance deducted twice, item only received once
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: Paste any error messages, chat logs, or attach screenshots here.
    validations:
      required: false

  - type: input
    id: discord
    attributes:
      label: Your Discord username
      placeholder: "e.g. stickman112"
    validations:
      required: true
